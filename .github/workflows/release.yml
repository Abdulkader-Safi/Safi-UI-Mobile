# Release pipeline — currently runs `cargo publish --dry-run` only.
#
# When ready to publish to crates.io:
#   1. Create a CARGO_REGISTRY_TOKEN repo secret
#   2. Remove the `--dry-run` flag from both publish steps
#   3. Push a `vX.Y.Z` tag matching the crate versions
#
# Tag a release with:
#   git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

defaults:
  run:
    working-directory: SafiUI

jobs:
  publish:
    name: cargo publish (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: SafiUI -> target
          shared-key: release

      - name: cargo publish --dry-run (safi-ui-macros)
        run: cargo publish --dry-run -p safi-ui-macros

      - name: cargo publish --dry-run (safi-ui)
        # `safi-ui` depends on `safi-ui-macros` via a path + version dep;
        # `--dry-run` cannot fully resolve until macros is on crates.io,
        # so allow this step to fail until the first real release.
        continue-on-error: true
        run: cargo publish --dry-run -p safi-ui
